name: Nightly LLM Smoke

# 每天跑一次 `claude -p` 真实调用，验证其 JSON 输出 shape 没变。
# Anthropic 如果改了协议，这里会是最早发现的地方。
#
# 依赖 repo secret: ANTHROPIC_API_KEY
# （Claude Code CLI 在 CI 里用 API key 认证，等价于订阅登录）
#
# 如果 secret 未配置，整个 job 会 skip（不当作失败）——允许 fork PR 绿跑。

on:
  schedule:
    # 每天 UTC 03:00（北京 11:00）跑一次
    - cron: "0 3 * * *"
  workflow_dispatch: # 手动触发

jobs:
  smoke:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner != '' }} # always true for owner runs; placeholder for fork guard
    steps:
      - name: Check secret
        id: has_key
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANTHROPIC_API_KEY secret not set; skipping LLM smoke"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.has_key.outputs.has_key == 'true'

      - uses: pnpm/action-setup@v4
        if: steps.has_key.outputs.has_key == 'true'
        with:
          version: 9

      - uses: actions/setup-node@v4
        if: steps.has_key.outputs.has_key == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        if: steps.has_key.outputs.has_key == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Claude Code CLI
        if: steps.has_key.outputs.has_key == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run LLM smoke
        if: steps.has_key.outputs.has_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pnpm smoke:llm

      - name: Run hook bundle smoke
        if: steps.has_key.outputs.has_key == 'true'
        run: |
          cd packages/cli
          pnpm build:hook
          cd ../..
          pnpm tsx scripts/hook-smoke-test.ts
